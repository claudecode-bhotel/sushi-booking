<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Cancelled - b hotel Sushi Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Inter:wght@300;400;600&family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="navbar-content">
                <div class="logo">
                    <span class="logo-b">b</span> hotel
                </div>
                <button class="lang-toggle" id="langToggle">JP / EN</button>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="payment-cancel-main">
            <div class="cancel-content">
                <div class="warning-icon">芒職聽</div>
                <h1 class="cancel-title" data-en="Payment Cancelled" data-jp="茫聛聤忙聰炉忙聣聲茫聛聞茫聛聦茫聜颅茫聝拢茫聝鲁茫聜禄茫聝芦茫聛聲茫聜聦茫聛戮茫聛聴茫聛聼">Payment Cancelled</h1>
                <p class="cancel-message" data-en="Your booking has not been completed. No charges have been made." data-jp="盲潞聢莽麓聞茫聛炉氓庐聦盲潞聠茫聛聴茫聛娄茫聛聞茫聛戮茫聛聸茫聜聯茫聙聜猫芦聥忙卤聜茫聛炉莽聶潞莽聰聼茫聛聴茫聛娄茫聛聞茫聛戮茫聛聸茫聜聯茫聙聜">Your booking has not been completed. No charges have been made.</p>

                <!-- Button Group -->
                <div class="button-group">
                    <button class="button button-secondary" onclick="history.back()" data-en="Try Again" data-jp="茫聜聜茫聛聠盲赂聙氓潞娄猫漏娄茫聛聶">Try Again</button>
                    <a href="index.html" class="button button-primary" data-en="Back to Home" data-jp="茫聝聸茫聝录茫聝聽茫聛芦忙聢禄茫聜聥">Back to Home</a>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-content">
                <p class="footer-copyright">脗漏 b hotel 芒聙聰 Koban-dori Goju (盲潞陇莽聲陋茅聙職茫聜聤盲潞聰氓聧聛)</p>
                <a href="privacy.html" class="footer-link" data-en="Privacy Policy" data-jp="茫聝聴茫聝漏茫聜陇茫聝聬茫聜路茫聝录茫聝聺茫聝陋茫聜路茫聝录">Privacy Policy</a>
            </div>
        </footer>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            updatePageLanguage();
        });

        function updatePageLanguage() {
            const lang = getLang();
            document.querySelectorAll('[data-en][data-jp]').forEach(element => {
                const text = lang === 'en' ? element.getAttribute('data-en') : element.getAttribute('data-jp');
                element.textContent = text;
            });
            document.documentElement.lang = lang;
        }

        document.getElementById('langToggle').addEventListener('click', function() {
            const currentLang = getLang();
            const newLang = currentLang === 'en' ? 'jp' : 'en';
            localStorage.setItem('lang', newLang);
            updatePageLanguage();
        });
    </script>
</body>
</html>
